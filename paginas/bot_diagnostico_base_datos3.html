<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bot Diagnóstico Inteligente - Base de Datos</title>
  <style>
    :root{
      --bg1:#040817;
      --bg2:#0b1530;
      --glass:rgba(255,255,255,.08);
      --line:rgba(255,255,255,.12);
      --text:#eaf2ff;
      --muted:#9db0d1;
      --a1:#38bdf8;
      --a2:#8b5cf6;
      --a3:#22c55e;
      --u1:#2563eb;
      --u2:#06b6d4;
      --shadow:0 20px 60px rgba(0,0,0,.45);
      --r:26px
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      font-family:Inter,Arial,sans-serif;
      color:var(--text);
      background: radial-gradient(circle at 15% 20%, rgba(56,189,248,0.15) 0%, transparent 45%), radial-gradient(circle at 85% 80%, rgba(139,92,246,0.15) 0%, transparent 45%), var(--bg1);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
    }
    .chat-container{
      width:100%;
      max-width:850px;
      height:85vh;
      background:linear-gradient(135deg, var(--bg1), var(--bg2));
      border:1px solid var(--line);
      border-radius:var(--r);
      box-shadow:var(--shadow);
      display:flex;
      flex-direction:column;
      overflow:hidden;
      backdrop-filter:blur(20px);
      position:relative;
    }
    .chat-header{
      padding:20px 24px;
      background:rgba(255,255,255,0.02);
      border-bottom:1px solid var(--line);
      display:flex;
      align-items:center;
      justify-content:space-between;
    }
    .bot-info{display:flex;align-items:center;gap:12px}
    .bot-avatar{
      width:42px;
      height:42px;
      background:linear-gradient(135deg, var(--a1), var(--a2));
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:20px;
      box-shadow:0 0 15px rgba(56,189,248,0.4);
    }
    .bot-status{font-size:12px;color:var(--a1);margin-top:2px}
    .topbar{
      padding:12px 18px 0;
      border-bottom:1px solid var(--line);
      background:rgba(255,255,255,0.02);
    }
    .topline{
      display:flex;
      justify-content:space-between;
      gap:10px;
      color:var(--muted);
      font-size:.88rem;
      margin-bottom:8px
    }
    .bar{
      width:100%;
      height:10px;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.08);
      border-radius:999px;
      overflow:hidden;
      margin-bottom:12px;
    }
    .bar>div{
      height:100%;
      width:0%;
      border-radius:inherit;
      background:linear-gradient(90deg,var(--a1),var(--a2));
      transition:width .35s ease
    }
    .chatbox{
      flex:1;
      padding:24px;
      overflow-y:auto;
      display:flex;
      flex-direction:column;
      gap:16px;
    }
    .msg-row{display:flex;width:100%}
    .msg-row.bot{justify-content:flex-start}
    .msg-row.user{justify-content:flex-end}
    .msg-bubble{
      max-width:75%;
      padding:14px 18px;
      border-radius:18px;
      font-size:15px;
      line-height:1.5;
    }
    .bot .msg-bubble{
      background:var(--glass);
      border:1px solid var(--line);
      border-top-left-radius:4px;
    }
    .user .msg-bubble{
      background:linear-gradient(135deg, var(--u1), var(--u2));
      border-top-right-radius:4px;
      box-shadow:0 4px 15px rgba(37,99,235,0.2);
    }
    .chat-input-area{
      padding:20px 24px;
      background:rgba(0,0,0,0.2);
      border-top:1px solid var(--line);
      display:flex;
      gap:12px;
    }
    .chat-input{
      flex:1;
      background:rgba(255,255,255,0.05);
      border:1px solid var(--line);
      border-radius:14px;
      padding:14px 18px;
      color:#fff;
      font-size:15px;
      outline:none;
      transition:all 0.3s;
    }
    .chat-input:focus{border-color:var(--a1);box-shadow:0 0 10px rgba(56,189,248,0.2)}
    .chat-input:disabled{opacity:0.5;cursor:not-allowed}
    .send-btn{
      background:linear-gradient(135deg, var(--a1), var(--a2));
      border:none;
      border-radius:14px;
      padding:0 24px;
      color:#fff;
      font-weight:600;
      cursor:pointer;
      transition:all 0.3s;
    }
    .send-btn:hover{transform:translateY(-2px);box-shadow:0 5px 15px rgba(139,92,246,0.4)}
    .send-btn:disabled{background:rgba(255,255,255,0.05);color:var(--muted);cursor:not-allowed;transform:none;box-shadow:none}
    .option-eval-btn{
      display:block;
      margin:10px 0;
      padding:12px 16px;
      width:100%;
      text-align:left;
      border-radius:10px;
      border:1px solid var(--line);
      background:rgba(255,255,255,0.03);
      color:#fff;
      font-size:14px;
      cursor:pointer;
      transition:all 0.2s;
    }
    .option-eval-btn:hover:not(:disabled){
      background:rgba(56,189,248,0.08);
      border-color:var(--a1);
    }
    .option-eval-btn:disabled{cursor:not-allowed;opacity:0.6}
    .option-eval-btn.correct{background:rgba(34,197,94,0.2);border-color:var(--a3)}
    .option-eval-btn.incorrect{background:rgba(239,68,68,0.2);border-color:#f87171}
    .summary{display:grid;gap:12px;margin-top:12px}
    .sum-card{
      background:rgba(255,255,255,.06);
      border:1px solid var(--line);
      border-radius:18px;
      padding:14px
    }
    .sum-card h3{margin:0 0 8px;font-size:1rem}
    .topic{
      display:flex;
      justify-content:space-between;
      gap:12px;
      margin:8px 0;
      color:#dbeafe;
      font-size:.94rem
    }
    .meter{
      height:8px;
      background:rgba(255,255,255,.08);
      border-radius:999px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.06)
    }
    .meter>div{
      height:100%;
      border-radius:inherit;
      background:linear-gradient(90deg,var(--a1),var(--a3))
    }
    .result{
      display:grid;
      gap:14px;
      margin-top:12px
    }
    .result-card{
      background:linear-gradient(180deg, rgba(255,255,255,.09), rgba(255,255,255,.05));
      border:1px solid var(--line);
      border-radius:22px;
      padding:18px
    }
    .result-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
    }
    .badge{
      padding:8px 12px;
      border-radius:999px;
      background:rgba(56,189,248,.12);
      border:1px solid rgba(56,189,248,.18);
      color:#9be7ff
    }
    .scorebig{font-size:2rem;font-weight:800}
    .mini{color:var(--muted);font-size:.92rem;line-height:1.6}
    .avatarWrap{display:flex;align-items:center;gap:12px}
    .avatar{
      width:54px;
      height:54px;
      border-radius:18px;
      background:linear-gradient(135deg,var(--a1),var(--a2));
      display:grid;
      place-items:center;
      color:#fff;
      flex:0 0 auto
    }
    .actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:12px
    }
    .action{
      border:none;
      cursor:pointer;
      padding:12px 14px;
      border-radius:14px;
      background:rgba(255,255,255,.06);
      color:var(--text);
      border:1px solid var(--line);
      transition:all 0.2s;
    }
    .action:hover{
      background:rgba(255,255,255,.12);
      transform:translateY(-1px);
    }
    .action-primary{
      background:linear-gradient(135deg, var(--a2), #6d28d9);
      color:#fff;
      font-weight:bold;
      border:none;
      box-shadow:0 4px 12px rgba(139,92,246,0.3);
    }
    .action-primary:hover{
      box-shadow:0 6px 20px rgba(139,92,246,0.4);
      transform:translateY(-2px);
    }
    .typing{
      display:inline-flex;
      gap:5px;
      align-items:center;
      padding:12px 15px;
      border-radius:18px;
      background:rgba(255,255,255,.06);
      border:1px solid var(--line);
      width:max-content;
      margin:12px 0 0
    }
    .typing span{
      width:8px;
      height:8px;
      border-radius:50%;
      background:#cbd5e1;
      opacity:.55;
      animation:bounce 1s infinite ease-in-out
    }
    .typing span:nth-child(2){animation-delay:.15s}
    .typing span:nth-child(3){animation-delay:.3s}
    .choices{
      display:grid;
      gap:10px;
      margin-top:12px
    }

    .btn-home {
      position: absolute;
      top: 15px;
      right: 20px;
      background: var(--glass);
      border: 1px solid var(--line);
      border-radius: 50%;
      width: 38px;
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      color: var(--text);
      font-size: 1rem;
      z-index: 10;
    }

    .btn-home:hover {
      background: rgba(255, 255, 255, 0.12);
      border-color: var(--a1);
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(56, 189, 248, 0.2);
    }
    .btn-home svg {
      width: 18px;
      height: 18px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .badge-nivel {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 12px;
      font-size: 0.7rem;
      font-weight: 600;
      margin-left: 8px;
    }
    .badge-nivel.basico { background: rgba(56,189,248,0.2); color: var(--a1); }
    .badge-nivel.intermedio { background: rgba(245,158,11,0.2); color: var(--a4); }
    .badge-nivel.avanzado { background: rgba(239,68,68,0.2); color: #f87171; }
    .badge-tipo {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 12px;
      font-size: 0.7rem;
      font-weight: 600;
      background: rgba(139,92,246,0.2);
      color: var(--a2);
      margin-left: 8px;
    }

    @keyframes bounce{0%,80%,100%{transform:translateY(0);opacity:.45}40%{transform:translateY(-5px);opacity:1}}
  </style>
</head>
<body>

  <div class="chat-container">
    <div class="chat-header">
      <div class="bot-info">
        <div class="bot-avatar">🧠</div>
        <div>
          <div style="font-weight:600;letter-spacing:0.5px;">Sistema Tutorial Inteligente (STI)</div>
          <div class="bot-status" id="botState">Inicializando...</div>
        </div>
      </div>
      <a href="../index.html" class="btn-home" title="Volver al inicio">
        <svg viewBox="0 0 24 24">
          <path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0a1 1 0 01-1-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 01-1 1"/>
        </svg>
      </a>
    </div>

    <div class="topbar">
      <div class="topline">
        <span id="progText">Progreso: 0%</span>
        <span id="stepText">Pregunta 0 de 25</span>
      </div>
      <div class="bar"><div id="barFill"></div></div>
    </div>
    
    <div class="chatbox" id="chatbox"></div>
    
    <div class="chat-input-area">
      <input type="text" class="chat-input" id="userInput" placeholder="Escribe tu respuesta..." disabled />
      <button class="send-btn" id="sendBtn" disabled>Enviar</button>
    </div>
  </div>

  <script src="../js/base_conocimiento_diagnostico.js"></script>
  <script src="../js/motor_diagnostico.js"></script>
  <script>
    // ============================================================
    // CONFIGURACIÓN
    // ============================================================
    const SCRIPT_BASE_URL = "https://script.google.com/macros/s/AKfycbyhL7BAwoDtJLw6YsPMKwtYIubPno3MLPVthpAeDrRyoS_lwI8DOr00Xw58wGi90aaHiQ/exec";
    const ACTIVE_SHEET_NAME = localStorage.getItem('sti_active_sheet_name') || "Datossti";
    const TOTAL_PREGUNTAS = 25; // 5 preguntas x 5 módulos
    const PREGUNTAS_POR_MODULO = 5;

    const MODULOS_STI = [
      { id: "Módulo 1: Introducción a las Bases de Datos", clave: "intro" },
      { id: "Módulo 2: Diseño de Bases de Datos", clave: "relacional" },
      { id: "Módulo 3: Administración de Bases de Datos", clave: "sql" },
      { id: "Módulo 4: Optimización de Bases de Datos", clave: "diseno" },
      { id: "Módulo 5: Herramientas y Tecnologías", clave: "tools" }
    ];

    // ============================================================
    // ESTADO GLOBAL
    // ============================================================
    const db = {
      student: { name: '', lastname: '', id: '', career: '', section: '' },
      answers: [],
      themes: {
        "intro": { score: 0, total: 0, nombre: "Introducción a BD" },
        "relacional": { score: 0, total: 0, nombre: "Modelo Relacional" },
        "sql": { score: 0, total: 0, nombre: "Lenguaje SQL" },
        "diseno": { score: 0, total: 0, nombre: "Diseño de BD" },
        "tools": { score: 0, total: 0, nombre: "SGBD y Herramientas" }
      },
      startedAt: new Date().toISOString(),
      endedAt: null,
      score: 0,
      level: '',
      historialPreguntas: [] // Para adaptatividad
    };

    let currentModuloIndex = 0;
    let preguntasRespondidasPorModulo = 0;
    let preguntasModuloActual = [];
    let currentProfileStep = 0;
    let preguntaActual = null;
    let soundOn = true;

    // ============================================================
    // DOM REFERENCIAS
    // ============================================================
    const chatbox = document.getElementById('chatbox');
    const input = document.getElementById('userInput');
    const send = document.getElementById('sendBtn');
    const state = document.getElementById('botState');
    const barFill = document.getElementById('barFill');
    const progText = document.getElementById('progText');
    const stepText = document.getElementById('stepText');

    // ============================================================
    // AUDIO
    // ============================================================
    const audioCtx = window.AudioContext ? new AudioContext() : null;

    function tone(f, d = 0.08, g = .04, t = 'sine') {
      if (!soundOn || !audioCtx) return;
      const o = audioCtx.createOscillator(), x = audioCtx.createGain();
      o.type = t; o.frequency.value = f; x.gain.value = g; o.connect(x); x.connect(audioCtx.destination);
      o.start(); o.stop(audioCtx.currentTime + d);
    }
    function okSound() { tone(660, .07, .035, 'sine'); setTimeout(() => tone(880, .08, .035, 'sine'), 80); }
    function badSound() { tone(220, .11, .05, 'sawtooth'); }
    function clickSound() { tone(520, .04, .02, 'triangle'); }

    // ============================================================
    // UTILIDADES
    // ============================================================
    function scrollBottom() { chatbox.scrollTop = chatbox.scrollHeight; }

    function row(text, who = 'bot', html = false) {
      const r = document.createElement('div');
      r.className = `msg-row ${who}`;
      const b = document.createElement('div');
      b.className = 'msg-bubble';
      if (html) b.innerHTML = text;
      else b.textContent = text;
      r.appendChild(b);
      chatbox.appendChild(r);
      scrollBottom();
    }

    function typing() {
      const r = document.createElement('div');
      r.className = 'msg-row bot';
      r.id = 'typing';
      const t = document.createElement('div');
      t.className = 'typing';
      t.innerHTML = '<span></span><span></span><span></span>';
      r.appendChild(t);
      chatbox.appendChild(r);
      scrollBottom();
    }

    function rmTyping() {
      const t = document.getElementById('typing');
      if (t) t.remove();
    }

    function setProgress() {
      const totalRespondidas = currentModuloIndex * PREGUNTAS_POR_MODULO + preguntasRespondidasPorModulo;
      const p = Math.round((totalRespondidas / TOTAL_PREGUNTAS) * 100);
      barFill.style.width = `${p}%`;
      progText.textContent = `Progreso: ${p}%`;
      stepText.textContent = `Pregunta ${Math.min(totalRespondidas + 1, TOTAL_PREGUNTAS)} de ${TOTAL_PREGUNTAS}`;
    }

    function themePct(clave) {
      const x = db.themes[clave];
      if (!x || !x.total) return 0;
      return Math.round((x.score / x.total) * 100);
    }

    function getNombreTema(clave) {
      const map = {
        'intro': 'Introducción a BD',
        'relacional': 'Modelo Relacional',
        'sql': 'Lenguaje SQL',
        'diseno': 'Diseño de BD',
        'tools': 'SGBD y Herramientas'
      };
      return map[clave] || clave;
    }

    // ============================================================
    // REGISTRO DE PERFIL
    // ============================================================
    function iniciarProcesoRegistro() {
      currentProfileStep = 1;
      state.textContent = 'Registro Perfil...';
      row('¡Bienvenido al Módulo de Diagnóstico Inteligente! Para inicializar tu perfil y trazar tu ruta adaptativa, requerimos tus datos de identificación.', 'bot');
      setTimeout(() => {
        row('Por favor, ingresa tu **Primer Nombre**:', 'bot');
        input.placeholder = 'Escribe tu nombre...';
        input.disabled = false;
        send.disabled = false;
        input.focus();
      }, 600);
    }

    function manejarRegistroPerfil(v) {
      clickSound();
      switch(currentProfileStep) {
        case 1:
          db.student.name = v;
          currentProfileStep = 2;
          row('Perfecto. Ahora ingresa tu **Primer Apellido**:', 'bot');
          break;
        case 2:
          db.student.lastname = v;
          currentProfileStep = 3;
          row('Indica la **Carrera** a la cual perteneces:', 'bot');
          break;
        case 3:
          db.student.career = v;
          currentProfileStep = 4;
          row('Ingresa tu **Sección** académica:', 'bot');
          break;
        case 4:
          db.student.section = v;
          currentProfileStep = 5;
          row('Finalmente, introduce tu **Número de Cédula o ID Estudiantil**:', 'bot');
          break;
        case 5:
          db.student.id = v;
          currentProfileStep = 6;
          localStorage.setItem('sti_student_id', db.student.id);
          state.textContent = 'En línea';
          row(`¡Registro Exitoso! Bienvenido **${db.student.name} ${db.student.lastname}**. Iniciaremos el diagnóstico adaptativo con ${TOTAL_PREGUNTAS} preguntas (5 por módulo). ¡Comencemos!`, 'bot');
          setTimeout(ejecutarSiguienteModulo, 1500);
          break;
      }
    }

    // ============================================================
    // SELECCIONAR PREGUNTAS PARA EL MÓDULO ACTUAL
    // ============================================================
    function seleccionarPreguntasModulo(moduloId) {
      // Usar el motor adaptativo con el historial
      const preguntas = seleccionarPreguntasAdaptativas(
        moduloId,
        db.historialPreguntas.filter(h => h.modulo === moduloId),
        PREGUNTAS_POR_MODULO
      );
      return preguntas;
    }

    // ============================================================
    // EJECUTAR SIGUIENTE MÓDULO
    // ============================================================
    function ejecutarSiguienteModulo() {
      if (currentModuloIndex < MODULOS_STI.length) {
        const moduloActual = MODULOS_STI[currentModuloIndex];
        preguntasRespondidasPorModulo = 0;
        
        // Seleccionar preguntas para este módulo
        preguntasModuloActual = seleccionarPreguntasModulo(moduloActual.id);
        
        state.textContent = `Evaluando Módulo ${currentModuloIndex + 1}/5 - ${moduloActual.id}`;
        
        if (preguntasModuloActual.length === 0) {
          // Si no hay preguntas, usar contingencia
          row(`⚠️ No se encontraron preguntas para ${moduloActual.id}. Usando preguntas de contingencia.`, 'bot');
          preguntasModuloActual = generarPreguntasContingencia(moduloActual.clave, PREGUNTAS_POR_MODULO);
        }
        
        input.disabled = true;
        send.disabled = true;
        input.placeholder = "Selecciona una opción del diagnóstico...";

        row(`📚 **${moduloActual.id}** - Responderás ${preguntasModuloActual.length} preguntas.`, 'bot');
        
        setTimeout(mostrarSiguientePregunta, 1000);
      } else {
        finalizarEvaluacion();
      }
    }

    // ============================================================
    // MOSTRAR SIGUIENTE PREGUNTA
    // ============================================================
    function mostrarSiguientePregunta() {
      if (preguntasRespondidasPorModulo >= preguntasModuloActual.length) {
        // Módulo completado
        currentModuloIndex++;
        setTimeout(ejecutarSiguienteModulo, 1000);
        return;
      }

      setProgress();
      const pregunta = preguntasModuloActual[preguntasRespondidasPorModulo];
      preguntaActual = pregunta;
      
      const moduloActual = MODULOS_STI[currentModuloIndex];
      const numPregunta = currentModuloIndex * PREGUNTAS_POR_MODULO + preguntasRespondidasPorModulo + 1;
      
      const badgeNivel = getNivelTexto(pregunta.nivel);
      const badgeTipo = getTipoTexto(pregunta.tipo);
      
      // Mostrar pregunta
      const contenedorPregunta = document.createElement('div');
      contenedorPregunta.className = 'msg-row bot';
      
      let htmlContenido = `<div class="msg-bubble">
        <strong>📝 Pregunta ${numPregunta} de ${TOTAL_PREGUNTAS}</strong><br>
        <strong>📚 Módulo: ${moduloActual.id}</strong><br>
        <span class="badge-nivel ${pregunta.nivel}">${badgeNivel}</span>
        <span class="badge-tipo">${badgeTipo}</span>
        <br><br>
        ${pregunta.pregunta}<br><br>`;
      
      if (pregunta.tipo === 'vf') {
        // Verdadero/Falso
        htmlContenido += `<strong>Selecciona tu respuesta:</strong><div class="choices">
          <button class="option-eval-btn" onclick="evaluarRespuestaSeleccionada(true)">
            <strong>✅</strong> Verdadero
          </button>
          <button class="option-eval-btn" onclick="evaluarRespuestaSeleccionada(false)">
            <strong>❌</strong> Falso
          </button>
        </div>`;
      } else if (pregunta.tipo === 'completacion') {
        // Completación - mostrar opciones
        htmlContenido += `<strong>Selecciona la palabra correcta:</strong><div class="choices">`;
        pregunta.opciones.forEach((opcion, index) => {
          htmlContenido += `<button class="option-eval-btn" onclick="evaluarRespuestaSeleccionada('${opcion}')">
            <strong>${String.fromCharCode(65 + index)})</strong> ${opcion}
          </button>`;
        });
        htmlContenido += `</div>`;
      } else {
        // Selección múltiple (4 opciones)
        htmlContenido += `<strong>Selecciona tu respuesta:</strong><div class="choices">`;
        pregunta.opciones.forEach((opcion, index) => {
          htmlContenido += `<button class="option-eval-btn" onclick="evaluarRespuestaSeleccionada(${index})">
            <strong>${String.fromCharCode(65 + index)})</strong> ${opcion}
          </button>`;
        });
        htmlContenido += `</div>`;
      }
      
      htmlContenido += `</div>`;
      contenedorPregunta.innerHTML = htmlContenido;
      chatbox.appendChild(contenedorPregunta);
      scrollBottom();
    }

    // ============================================================
    // EVALUAR RESPUESTA
    // ============================================================
    function evaluarRespuestaSeleccionada(respuestaUsuario) {
      clickSound();
      
      const botones = document.querySelectorAll('.option-eval-btn');
      botones.forEach(btn => btn.disabled = true);

      const pregunta = preguntaActual;
      const moduloActual = MODULOS_STI[currentModuloIndex];
      const clave = moduloActual.clave;
      
      // Evaluar respuesta
      const resultado = evaluarRespuestaDiagnostico(pregunta, respuestaUsuario);
      
      // Mostrar respuesta del usuario
      let textoRespuesta = '';
      if (pregunta.tipo === 'vf') {
        textoRespuesta = respuestaUsuario ? 'Verdadero' : 'Falso';
      } else if (pregunta.tipo === 'completacion') {
        textoRespuesta = respuestaUsuario;
      } else {
        textoRespuesta = pregunta.opciones[respuestaUsuario] || respuestaUsuario;
      }
      row(`📝 ${textoRespuesta}`, 'user');

      // Registrar en historial para adaptatividad
      db.historialPreguntas.push({
        modulo: moduloActual.id,
        preguntaId: pregunta.id,
        nivel: pregunta.nivel,
        correcta: resultado.correcta
      });

      // Registrar en estadísticas
      db.themes[clave].total += 1;
      if (resultado.correcta) {
        db.score += 1;
        db.themes[clave].score += 1;
        okSound();
        // Marcar botón correcto
        const botonesCorrectos = document.querySelectorAll('.option-eval-btn');
        botonesCorrectos.forEach((btn, idx) => {
          if (pregunta.tipo === 'multiple' && idx === pregunta.respuestaCorrecta) {
            btn.classList.add('correct');
          } else if (pregunta.tipo === 'vf' && pregunta.respuestaCorrecta === true && btn.textContent.includes('Verdadero')) {
            btn.classList.add('correct');
          } else if (pregunta.tipo === 'vf' && pregunta.respuestaCorrecta === false && btn.textContent.includes('Falso')) {
            btn.classList.add('correct');
          } else if (pregunta.tipo === 'completacion' && btn.textContent.includes(pregunta.respuestaCorrecta)) {
            btn.classList.add('correct');
          }
        });
        row(`✅ **¡Correcto!** ${pregunta.feedback}`, 'bot');
      } else {
        badSound();
        // Marcar la respuesta correcta
        const botonesCorrectos = document.querySelectorAll('.option-eval-btn');
        botonesCorrectos.forEach((btn, idx) => {
          if (pregunta.tipo === 'multiple' && idx === pregunta.respuestaCorrecta) {
            btn.classList.add('correct');
          } else if (pregunta.tipo === 'vf' && pregunta.respuestaCorrecta === true && btn.textContent.includes('Verdadero')) {
            btn.classList.add('correct');
          } else if (pregunta.tipo === 'vf' && pregunta.respuestaCorrecta === false && btn.textContent.includes('Falso')) {
            btn.classList.add('correct');
          } else if (pregunta.tipo === 'completacion' && btn.textContent.includes(pregunta.respuestaCorrecta)) {
            btn.classList.add('correct');
          }
        });
        // Marcar la respuesta incorrecta seleccionada
        if (respuestaUsuario !== undefined && respuestaUsuario !== null) {
          botonesCorrectos.forEach((btn) => {
            if (btn.textContent.includes(textoRespuesta) || 
                (pregunta.tipo === 'multiple' && btn.textContent.includes(pregunta.opciones[respuestaUsuario]))) {
              btn.classList.add('incorrect');
            }
          });
        }
        row(`❌ **Incorrecto.** ${pregunta.feedback}`, 'bot');
        if (pregunta.tipo === 'multiple' || pregunta.tipo === 'completacion') {
          row(`💡 La respuesta correcta era: **${pregunta.respuestaCorrecta}**`, 'bot');
        } else if (pregunta.tipo === 'vf') {
          row(`💡 La respuesta correcta era: **${pregunta.respuestaCorrecta ? 'Verdadero' : 'Falso'}**`, 'bot');
        }
      }

      db.answers.push({
        theme: clave,
        question: pregunta.pregunta,
        answer: textoRespuesta,
        correct: resultado.correcta,
        ts: new Date().toISOString()
      });

      scrollBottom();
      preguntasRespondidasPorModulo++;
      setProgress();
      
      setTimeout(mostrarSiguientePregunta, 3500);
    }

    // ============================================================
    // PREGUNTAS DE CONTINGENCIA
    // ============================================================
    function generarPreguntasContingencia(clave, cantidad) {
      const preguntasBase = {
        'intro': [
          {
            id: 'cont_intro_1',
            tipo: 'multiple',
            nivel: 'básico',
            pregunta: "¿Cuál es el propósito principal de un SGBD?",
            opciones: ["Gestionar y organizar datos", "Crear páginas web", "Editar imágenes", "Diseñar interfaces"],
            respuestaCorrecta: 0,
            feedback: "El SGBD gestiona y organiza datos de manera eficiente."
          },
          {
            id: 'cont_intro_2',
            tipo: 'vf',
            nivel: 'básico',
            pregunta: "Las bases de datos relacionales usan tablas con filas y columnas.",
            respuestaCorrecta: true,
            feedback: "Correcto. Las bases de datos relacionales usan tablas."
          }
        ],
        'relacional': [
          {
            id: 'cont_rel_1',
            tipo: 'multiple',
            nivel: 'básico',
            pregunta: "¿Qué es la normalización?",
            opciones: ["Reducir redundancia", "Crear copias de seguridad", "Optimizar consultas", "Crear índices"],
            respuestaCorrecta: 0,
            feedback: "La normalización reduce redundancia y mejora integridad."
          }
        ],
        'sql': [
          {
            id: 'cont_sql_1',
            tipo: 'multiple',
            nivel: 'básico',
            pregunta: "¿Qué significa SQL?",
            opciones: ["Structured Query Language", "Standard Query Language", "Simple Query Language", "System Query Language"],
            respuestaCorrecta: 0,
            feedback: "SQL significa Structured Query Language."
          }
        ],
        'diseno': [
          {
            id: 'cont_dis_1',
            tipo: 'multiple',
            nivel: 'básico',
            pregunta: "¿Qué es un índice en bases de datos?",
            opciones: ["Acelera búsquedas", "Almacena datos", "Crea copias de seguridad", "Gestiona usuarios"],
            respuestaCorrecta: 0,
            feedback: "Un índice acelera la búsqueda de datos."
          }
        ],
        'tools': [
          {
            id: 'cont_tools_1',
            tipo: 'multiple',
            nivel: 'básico',
            pregunta: "¿Qué es PostgreSQL?",
            opciones: ["SGBD relacional", "Base de datos NoSQL", "Lenguaje de programación", "Herramienta de diseño"],
            respuestaCorrecta: 0,
            feedback: "PostgreSQL es un SGBD relacional."
          }
        ]
      };
      
      const preguntas = preguntasBase[clave] || preguntasBase['intro'];
      const resultado = [];
      for (let i = 0; i < Math.min(cantidad, preguntas.length); i++) {
        resultado.push(preguntas[i % preguntas.length]);
      }
      return resultado;
    }

    // ============================================================
    // FINALIZAR EVALUACIÓN
    // ============================================================
    function finalizarEvaluacion() {
      db.endedAt = new Date().toISOString();
      
      let level = 'Básico';
      if (db.score >= 20) level = 'Avanzado';
      else if (db.score >= 12) level = 'Intermedio';
      db.level = level;

      state.textContent = 'Completado';
      barFill.style.width = '100%';
      progText.textContent = 'Progreso: 100%';
      stepText.textContent = 'Diagnóstico Concluido';
      
      input.disabled = true;
      send.disabled = true;
      input.placeholder = 'Evaluación completada con éxito';

      row(`📊 **Evaluación Diagnóstica Finalizada**\n\n🎯 Puntaje Obtenido: **${db.score} / ${TOTAL_PREGUNTAS}** aciertos.\n🏆 Ubicación en el Sistema: **Nivel ${level}**`, 'bot');

      // Resumen por temas
      const temas = [
        { clave: 'intro', nombre: 'Introducción a BD' },
        { clave: 'relacional', nombre: 'Modelo Relacional' },
        { clave: 'sql', nombre: 'Lenguaje SQL' },
        { clave: 'diseno', nombre: 'Diseño de BD' },
        { clave: 'tools', nombre: 'SGBD y Herramientas' }
      ];
      
      let htmlResumen = '<div class="result-card"><strong>📈 Perfil Técnico y Cognitivo del Estudiante</strong><div class="summary">';
      
      temas.forEach(t => {
        const p = themePct(t.clave);
        htmlResumen += `<div class="sum-card">
                          <div class="topic"><span>${t.nombre}</span><strong>${p}%</strong></div>
                          <div class="meter"><div style="width:${p}%"></div></div>
                        </div>`;
      });
      
      htmlResumen += `</div></div>`;

      // Tarjeta de resultado
      htmlResumen += `
        <div class="result-card">
          <div class="result-head">
            <div class="avatarWrap">
              <div class="avatar">🧠</div>
              <div>
                <div class="scorebig">${db.score} / ${TOTAL_PREGUNTAS}</div>
                <div class="mini">Ubicación: <strong>${level}</strong> • ${db.student.name} ${db.student.lastname}</div>
                <div class="mini" style="font-size:0.75rem;">C.I.: ${db.student.id} | Carrera: ${db.student.career} | Secc: ${db.student.section}</div>
              </div>
            </div>
            <div class="badge">Módulo STI</div>
          </div>
          ${generarPlanDeRuta(level)}
        </div>
      `;

      // Botones de acción
      htmlResumen += `
        <div class="actions" style="display: flex; flex-direction: column; gap: 10px;">
          <button class="action action-primary" id="routeBtn">
            🔀 Acceder a mi Ruta de Aprendizaje
          </button>
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <button class="action" id="saveBtn">💾 Descargar Evidencia JSON</button>
            <button class="action" id="copyBtn">📋 Copiar Resumen</button>
          </div>
          <button class="action" id="soundBtn">🔊 Sonido: ON</button>
        </div>
      `;

      const contenedorResumen = document.createElement('div');
      contenedorResumen.className = 'msg-row bot';
      contenedorResumen.innerHTML = `<div class="msg-bubble">${htmlResumen}</div>`;
      chatbox.appendChild(contenedorResumen);
      scrollBottom();

      // EVENTOS DE BOTONES
      document.getElementById('routeBtn').onclick = () => {
        window.location.href = 'ruta_aprendizaje.html';
      };

      document.getElementById('saveBtn').onclick = () => {
        const blob = new Blob([JSON.stringify(db, null, 2)], { type: 'application/json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `Evidencia_Cognitiva_STI_${db.student.id || 'estudiante'}.json`;
        a.click();
        URL.revokeObjectURL(a.href);
      };

      document.getElementById('copyBtn').onclick = async () => {
        const txt = `ESTUDIANTE: ${db.student.name} ${db.student.lastname}\nC.I: ${db.student.id}\nCARRERA: ${db.student.career} | SECCIÓN: ${db.student.section}\nRENDIMIENTO GENERAL: ${db.score}/${TOTAL_PREGUNTAS}\nNIVEL STI: ${db.level}\n--- DIAGNÓSTICO POR EJES TEMÁTICOS ---\nIntroducción a BD: ${themePct('intro')}%\nModelo Relacional: ${themePct('relacional')}%\nLenguaje SQL: ${themePct('sql')}%\nDiseño de BD: ${themePct('diseno')}%\nSGBD y Herramientas: ${themePct('tools')}%`;
        try {
          await navigator.clipboard.writeText(txt);
          row('✓ Datos estructurados copiados al portapapeles con éxito.', 'bot');
        } catch(e) {
          row('⚠️ Error al copiar. Por favor, extraiga el resumen de manera manual.', 'bot');
        }
      };

      document.getElementById('soundBtn').onclick = function() {
        soundOn = !soundOn;
        this.textContent = soundOn ? "🔊 Sonido: ON" : "🔇 Sonido: OFF";
      };

      // ENVÍO A GOOGLE SHEETS
      if (SCRIPT_BASE_URL) {
        state.textContent = 'Sincronizando...';
        
        const formData = {
          action: "SAVE_STUDENT_PERFORMANCE",
          sheetName: ACTIVE_SHEET_NAME,
          id: db.student.id,
          name: db.student.name,
          lastname: db.student.lastname,
          career: db.student.career,
          section: db.student.section,
          score: db.score,
          level: db.level,
          startedAt: db.startedAt,
          endedAt: db.endedAt,
          introScore: themePct('intro'),
          relScore: themePct('relacional'),
          sqlScore: themePct('sql'),
          designScore: themePct('diseno'),
          toolsScore: themePct('tools')
        };

        fetch(SCRIPT_BASE_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain' },
          body: JSON.stringify(formData)
        })
        .then(response => response.json())
        .then(res => {
          if(res.status === "success") {
            row(`✅ Rendimiento académico reportado con éxito en la hoja: **${ACTIVE_SHEET_NAME}**`, 'bot');
          } else {
            row('⚠️ La nube recibió los datos pero el Google Script indicó problemas al insertarlos.', 'bot');
          }
          scrollBottom();
        })
        .catch(err => {
          console.error(err);
          row('⚠️ Error de red al sincronizar. Por seguridad, descarga tu respaldo manual (Evidencia JSON).', 'bot');
          scrollBottom();
        });
      }
    }

    // ============================================================
    // GENERAR PLAN DE RUTA
    // ============================================================
    function generarPlanDeRuta(nivel) {
      let htmlPlan = `<div style="margin-top:14px; padding-top:14px; border-top:1px solid var(--line);">
                        <h4 style="margin:0 0 8px; color:var(--a1);">🗺️ Ruta Adaptativa para el Estudiante:</h4>
                        <ul style="margin:0; padding-left:20px; font-size:0.88rem; color:var(--muted); line-height:1.6;">`;
      
      const pctIntro = themePct('intro');
      const pctRel = themePct('relacional');
      const pctSql = themePct('sql');
      const pctDis = themePct('diseno');
      const pctTools = themePct('tools');

      if (nivel === 'Básico') {
        htmlPlan += `<li><strong>Nivelación Obligatoria:</strong> Repasar conceptos del Módulo 1 (Arquitectura ANSI-SPARC e Independencia de Datos).</li>`;
        htmlPlan += `<li><strong>Refuerzo Lógico:</strong> Ejercicios guiados de Transformación de MER a tablas relacionales antes de utilizar código.</li>`;
      } else if (nivel === 'Intermedio') {
        if (pctRel < 75 || pctDis < 75) {
          htmlPlan += `<li><strong>Eje de Diseño:</strong> Reforzar las Formas Normales (1FN a 3FN) y Dependencias Transitivas para mitigar anomalías.</li>`;
        }
        if (pctSql < 75) {
          htmlPlan += `<li><strong>Eje Sintáctico:</strong> Prácticas intensivas de consultas multitabla empleando Cláusulas JOIN y Funciones de Agregación.</li>`;
        }
        htmlPlan += `<li><strong>Avance Secuencial:</strong> Autorizado para iniciar laboratorios del Módulo 5 (MySQL) y Módulo 6 (PostgreSQL).</li>`;
      } else {
        htmlPlan += `<li><strong>Fase Avanzada Directa:</strong> Exención de contenidos descriptivos básicos. Foco en optimización física de consultas y planes de ejecución.</li>`;
        htmlPlan += `<li><strong>Lógica Procedimental:</strong> Desarrollo avanzado de Triggers y automatización de lógica interna mediante funciones en PL/pgSQL.</li>`;
      }
      
      htmlPlan += `</ul></div>`;
      return htmlPlan;
    }

    // ============================================================
    // MANEJO DE ENTRADA DE TEXTO
    // ============================================================
    function procesarEntradaTexto() {
      const valor = input.value.trim();
      if (!valor) return;

      row(valor, 'user');
      input.value = "";

      if (currentProfileStep < 6) {
        manejarRegistroPerfil(valor);
      }
    }

    send.addEventListener('click', procesarEntradaTexto);
    input.addEventListener('keypress', (e) => { if(e.key === 'Enter') procesarEntradaTexto(); });

    // ============================================================
    // INICIALIZAR
    // ============================================================
    window.addEventListener('DOMContentLoaded', () => {
      barFill.style.width = '0%';
      iniciarProcesoRegistro();
    });
  </script>
</body>
</html>
