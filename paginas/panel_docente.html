<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Módulo de Control Docente - STI</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
  <style>
    :root {
      --bg1: #0e2b06;
      --bg2: #052101;
      --glass: rgba(255, 255, 255, .06);
      --line: rgba(255, 255, 255, .1);
      --text: #eaf2ff;
      --muted: #9db0d1;
      --a1: #38bdf8;
      --a2: #8b5cf6;
      --a3: #22c55e;
      --u1: #2563eb;
      --shadow: 0 20px 50px rgba(0, 0, 0, .5);
    }

    * { box-sizing: border-box; }
    
    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Inter', Arial, sans-serif;
      color: var(--text);
      background: radial-gradient(circle at 50% 50%, #abe8a2 0%, #0b280a 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 650px;
      background: var(--bg2);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 35px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      position: relative;
    }

    .btn-home {
      position: absolute;
      top: 15px;
      right: 20px;
      background: var(--glass);
      border: 1px solid var(--line);
      border-radius: 50%;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      color: var(--text);
      font-size: 1.2rem;
    }

    .btn-home:hover {
      background: rgba(255, 255, 255, 0.12);
      border-color: var(--a1);
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(56, 189, 248, 0.2);
    }

    .btn-home svg {
      width: 22px;
      height: 22px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    h1 {
      margin: 0 0 10px 0;
      font-size: 1.8rem;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    h1 span { color: var(--a1); }

    .subtitle {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 30px;
    }

    .section-card {
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 25px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.5px;
      color: var(--muted);
      text-transform: uppercase;
    }

    input[type="text"] {
      width: 100%;
      background: var(--glass);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 12px 15px;
      color: #fff;
      font-size: 0.95rem;
      margin-bottom: 10px;
      transition: all 0.3s ease;
    }

    input[type="text"]:focus {
      outline: none;
      border-color: var(--a1);
      box-shadow: 0 0 10px rgba(56, 189, 248, 0.2);
    }

    .helper {
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: -5px;
      margin-bottom: 15px;
    }

    button {
      width: 100%;
      background: linear-gradient(135deg, var(--u1) 0%, #1d4ed8 100%);
      border: none;
      border-radius: 10px;
      padding: 14px;
      color: #fff;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    button:hover {
      filter: brightness(1.1);
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(1px);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .status-box {
      margin-top: 20px;
      padding: 15px;
      border-radius: 12px;
      font-size: 0.9rem;
      font-weight: 500;
      display: none;
      line-height: 1.5;
    }

    .status-box.info { background: rgba(56, 189, 248, 0.1); border: 1px solid var(--a1); color: var(--a1); }
    .status-box.success { background: rgba(34, 197, 94, 0.1); border: 1px solid var(--a3); color: #22c55e; }
    .status-box.error { background: rgba(239, 68, 68, 0.1); border: 1px solid #ef4444; color: #ef4444; }

    .loading-spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,.1);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    #downloadContainer {
      display: none;
      margin-top: 15px;
    }

    .btn-download {
      background: linear-gradient(135deg, var(--a3) 0%, #16a34a 100%);
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      color: #fff;
      font-weight: bold;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .btn-download:hover {
      filter: brightness(1.1);
      transform: translateY(-1px);
    }
  </style>
</head>
<body>

<div class="container">
  <!-- Botón para volver al index -->
  <a href="../index.html" class="btn-home" title="Volver al inicio">
    <svg viewBox="0 0 24 24">
      <path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0a1 1 0 01-1-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 01-1 1"/>
    </svg>
  </a>

  <h1>📊 Panel del Docente <span>| STI</span></h1>
  <div class="subtitle">Generación de reportes por sección académica.</div>

  <div class="section-card">
    <label for="sectionInput">Sección Académica</label>
    <input type="text" id="sectionInput" placeholder="Ej: I1MD, SA12, IA12" />
    <div class="helper">Ingresa la sección para generar el reporte de todos los estudiantes.</div>
    <button id="generateBtn" onclick="generarReporte()">📄 Generar Reporte PDF</button>
  </div>

  <div id="statusConsole" class="status-box"></div>
  <div id="downloadContainer"></div>
</div>

<script>
  // ============================================================
  // CONFIGURACIÓN
  // ============================================================
  //const PROXY_URL = "../proxy.php";
  const SCRIPT_BASE_URL = "https://script.google.com/macros/s/AKfycbyhL7BAwoDtJLw6YsPMKwtYIubPno3MLPVthpAeDrRyoS_lwI8DOr00Xw58wGi90aaHiQ/exec";
  const SHEET_NAME = "Datossti";

  // ============================================================
  // FUNCIÓN PARA CONSULTAR ESTUDIANTES POR SECCIÓN
  // ============================================================
  async function obtenerEstudiantesPorSeccion(seccion) {
    try {
      const payload = {
        action: "GET_STUDENTS_BY_SECTION",
        sheetName: SHEET_NAME,
        seccion: seccion
      };

      console.log("📤 Consultando estudiantes de la sección:", seccion);

      const response = await fetch(SCRIPT_BASE_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify(payload)
      });

      if (!response.ok) {
        const errorText = await response.text();
        console.error("❌ Error HTTP:", errorText);
        throw new Error(`Error HTTP: ${response.status}`);
      }

      const data = await response.json();
      console.log("📊 Datos recibidos:", data);
      return data;
    } catch (error) {
      console.error("❌ Error al obtener estudiantes:", error);
      return null;
    }
  }

  // ============================================================
  // GENERAR REPORTE PDF CON jsPDF
  // ============================================================
  function generarPDF(estudiantes, seccion) {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });
    
    doc.setFont('helvetica');
    
    // ENCABEZADO
    doc.setFontSize(18);
    doc.setTextColor(37, 99, 235);
    doc.text('Sistema Tutorial Inteligente (STI)', 14, 20);
    
    doc.setFontSize(14);
    doc.setTextColor(0, 0, 0);
    doc.text('Reporte de Rendimiento por Sección Académica', 14, 28);
    
    doc.setFontSize(12);
    doc.setTextColor(0, 0, 0);
    doc.text(`Sección: ${seccion}`, 14, 35);
    
    doc.setFontSize(10);
    doc.setTextColor(100, 100, 100);
    doc.text(`Fecha de generación: ${new Date().toLocaleString('es-ES')}`, 14, 41);
    
    doc.setDrawColor(37, 99, 235);
    doc.setLineWidth(0.5);
    doc.line(14, 44, 290, 44);
    
    // TABLA
    const columnas = [
      { header: '#', dataKey: 'num' },
      { header: 'Cédula', dataKey: 'cedula' },
      { header: 'Nombre', dataKey: 'nombre' },
      { header: 'Apellido', dataKey: 'apellido' },
      { header: 'Score', dataKey: 'score' },
      { header: 'Nivel', dataKey: 'nivel' },
      { header: 'Intro BD', dataKey: 'intro' },
      { header: 'Modelo Rel.', dataKey: 'rel' },
      { header: 'Lenguaje SQL', dataKey: 'sql' },
      { header: 'Diseño BD', dataKey: 'design' },
      { header: 'SGBD', dataKey: 'tools' },
      { header: 'Fecha Reg.', dataKey: 'fecha' }
    ];
    
    const filas = estudiantes.map((e, i) => ({
      num: i + 1,
      cedula: e.cedula || '-',
      nombre: e.nombre || '-',
      apellido: e.apellido || '-',
      score: e.score || '0',
      nivel: e.nivel || '-',
      intro: e.intro || '0%',
      rel: e.rel || '0%',
      sql: e.sql || '0%',
      design: e.design || '0%',
      tools: e.tools || '0%',
      fecha: e.fecha ? new Date(e.fecha).toLocaleDateString('es-ES') : '-'
    }));
    
    doc.autoTable({
      startY: 48,
      head: [columnas.map(c => c.header)],
      body: filas.map(f => [
        f.num,
        f.cedula,
        f.nombre,
        f.apellido,
        f.score,
        f.nivel,
        f.intro,
        f.rel,
        f.sql,
        f.design,
        f.tools,
        f.fecha
      ]),
      theme: 'grid',
      headStyles: {
        fillColor: [37, 99, 235],
        textColor: [255, 255, 255],
        fontSize: 8,
        halign: 'center',
      },
      styles: {
        fontSize: 7,
        cellPadding: 2,
        valign: 'middle',
      },
      columnStyles: {
        0: { halign: 'center', cellWidth: 8 },
        1: { halign: 'center', cellWidth: 20 },
        2: { halign: 'left', cellWidth: 25 },
        3: { halign: 'left', cellWidth: 25 },
        4: { halign: 'center', cellWidth: 12 },
        5: { halign: 'center', cellWidth: 20 },
        6: { halign: 'center', cellWidth: 15 },
        7: { halign: 'center', cellWidth: 18 },
        8: { halign: 'center', cellWidth: 18 },
        9: { halign: 'center', cellWidth: 18 },
        10: { halign: 'center', cellWidth: 15 },
        11: { halign: 'center', cellWidth: 22 }
      },
      didDrawPage: function(data) {
        const pageCount = doc.internal.getNumberOfPages();
        const currentPage = doc.internal.getCurrentPageInfo().pageNumber;
        doc.setFontSize(8);
        doc.setTextColor(150, 150, 150);
        doc.text(`Página ${currentPage} de ${pageCount}`, 14, doc.internal.pageSize.height - 10);
        doc.text(`Total de estudiantes: ${estudiantes.length}`, 250, doc.internal.pageSize.height - 10);
      }
    });
    
    const finalY = doc.lastAutoTable.finalY || 200;
    doc.setFontSize(9);
    doc.setTextColor(100, 100, 100);
    doc.text('Reporte generado automáticamente por STI', 14, finalY + 15);
    doc.text('Universidad Politécnica Territorial de Trujillo', 14, finalY + 22);
    
    return doc.output('blob');
  }

  // ============================================================
  // GENERAR REPORTE
  // ============================================================
  async function generarReporte() {
    const seccionInput = document.getElementById('sectionInput');
    const seccion = seccionInput.value.trim();
    const generateBtn = document.getElementById('generateBtn');
    const statusConsole = document.getElementById('statusConsole');
    const downloadContainer = document.getElementById('downloadContainer');

    if (!seccion) {
      mostrarStatus('⚠️ Por favor, ingresa una sección académica.', 'error');
      return;
    }

    generateBtn.disabled = true;
    generateBtn.innerHTML = '<span class="loading-spinner"></span> Generando reporte...';
    downloadContainer.style.display = 'none';
    downloadContainer.innerHTML = '';
    mostrarStatus('⏳ Consultando estudiantes de la sección ' + seccion + '...', 'info');

    try {
      const resultado = await obtenerEstudiantesPorSeccion(seccion);

      if (!resultado || resultado.status !== "success") {
        mostrarStatus('❌ Error al obtener los datos: ' + (resultado?.message || 'Sin datos'), 'error');
        generateBtn.disabled = false;
        generateBtn.innerHTML = '📄 Generar Reporte PDF';
        return;
      }

      if (!resultado.estudiantes || resultado.estudiantes.length === 0) {
        mostrarStatus('⚠️ No se encontraron estudiantes en la sección "' + seccion + '".', 'error');
        generateBtn.disabled = false;
        generateBtn.innerHTML = '📄 Generar Reporte PDF';
        return;
      }

      const pdfBlob = generarPDF(resultado.estudiantes, seccion);
      const url = URL.createObjectURL(pdfBlob);
      
      downloadContainer.style.display = 'block';
      downloadContainer.innerHTML = `
        <button class="btn-download" onclick="descargarPDF('${url}', '${seccion}')">
          ⬇️ Descargar Reporte PDF - Sección ${seccion} (${resultado.estudiantes.length} estudiantes)
        </button>
      `;

      mostrarStatus(`✅ Reporte generado con éxito. ${resultado.estudiantes.length} estudiantes encontrados.`, 'success');
      
    } catch (error) {
      console.error("❌ Error:", error);
      mostrarStatus('❌ Error al generar el reporte: ' + error.message, 'error');
    } finally {
      generateBtn.disabled = false;
      generateBtn.innerHTML = '📄 Generar Reporte PDF';
    }
  }

  // ============================================================
  // FUNCIÓN PARA DESCARGAR PDF
  // ============================================================
  function descargarPDF(url, seccion) {
    const link = document.createElement('a');
    link.href = url;
    link.download = `Reporte_STI_Seccion_${seccion}_${new Date().toISOString().slice(0,10)}.pdf`;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    setTimeout(() => URL.revokeObjectURL(url), 10000);
  }

  // ============================================================
  // MOSTRAR ESTADO EN CONSOLA
  // ============================================================
  function mostrarStatus(msg, type) {
    const consoleBox = document.getElementById('statusConsole');
    consoleBox.className = `status-box ${type}`;
    consoleBox.innerHTML = msg;
    consoleBox.style.display = 'block';
  }

  // ============================================================
  // PERMITIR ENVIAR CON ENTER
  // ============================================================
  document.getElementById('sectionInput').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') {
      generarReporte();
    }
  });
</script>

</body>
</html>
